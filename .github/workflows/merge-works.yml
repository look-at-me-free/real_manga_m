name: Merge Uploaded Works Into Library

on:
  workflow_dispatch:
  push:
    paths:
      - 'uploaded_works/*.json'

permissions:
  contents: write

jobs:
  merge:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Merge uploaded works into library.json
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          $libraryPath = "library.json"
          $worksFolder = "uploaded_works"
          $outputPath  = "library.json"

          function Read-Json {
              param([string]$Path)

              if (-not (Test-Path -LiteralPath $Path)) {
                  throw "Missing file: $Path"
              }

              $raw = Get-Content -LiteralPath $Path -Raw -Encoding UTF8

              if ([string]::IsNullOrWhiteSpace($raw)) {
                  throw "Empty JSON file: $Path"
              }

              try {
                  return $raw | ConvertFrom-Json -Depth 100
              }
              catch {
                  throw "Invalid JSON in file: $Path`n$($_.Exception.Message)"
              }
          }

          function To-Array {
              param($obj)

              if ($null -eq $obj) {
                  return @()
              }

              if ($obj -is [System.Collections.IEnumerable] -and -not ($obj -is [string])) {
                  $items = @()
                  foreach ($item in $obj) {
                      $items += $item
                  }
                  return $items
              }

              return @($obj)
          }

          function Normalize-Works {
              param($block)

              if ($null -eq $block) {
                  return @()
              }

              if ($block.PSObject.Properties.Name -contains "works") {
                  return To-Array $block.works
              }

              if ($block -is [System.Collections.IEnumerable] -and -not ($block -is [string])) {
                  return To-Array $block
              }

              return @($block)
          }

          function Validate-Work {
              param(
                  $work,
                  [string]$sourceFile
              )

              foreach ($prop in @("id", "slug", "display", "source", "entries")) {
                  if (-not ($work.PSObject.Properties.Name -contains $prop)) {
                      throw "Work in '$sourceFile' is missing required property '$prop'."
                  }
              }

              $entries = To-Array $work.entries
              foreach ($entry in $entries) {
                  foreach ($entryProp in @("slug", "path", "type", "subtitle")) {
                      if (-not ($entry.PSObject.Properties.Name -contains $entryProp)) {
                          throw "Work '$($work.slug)' in '$sourceFile' has an entry missing '$entryProp'."
                      }
                  }
              }
          }

          if (-not (Test-Path -LiteralPath $libraryPath)) {
              throw "library.json was not found at repo root."
          }

          if (-not (Test-Path -LiteralPath $worksFolder)) {
              Write-Host "uploaded_works folder was not found at repo root. Nothing to merge."
              exit 0
          }

          $library = Read-Json -Path $libraryPath

          if (-not ($library.PSObject.Properties.Name -contains "works")) {
              throw "library.json does not contain a top-level 'works' array."
          }

          $worksList = New-Object System.Collections.ArrayList
          foreach ($w in (To-Array $library.works)) {
              [void]$worksList.Add($w)
          }

          $files = Get-ChildItem -LiteralPath $worksFolder -Filter *.json -File -ErrorAction SilentlyContinue

          if (-not $files -or $files.Count -eq 0) {
              Write-Host "No uploaded work files found."
              exit 0
          }

          $processedFiles = New-Object System.Collections.ArrayList

          foreach ($file in $files) {
              Write-Host "Processing $($file.Name)"

              try {
                  $block = Read-Json -Path $file.FullName
              }
              catch {
                  Write-Host "Skipping invalid file: $($file.Name)"
                  Write-Host $_.Exception.Message
                  continue
              }

              $newWorks = Normalize-Works -block $block

              if (-not $newWorks -or $newWorks.Count -eq 0) {
                  Write-Host "No works found in $($file.Name). Skipping."
                  continue
              }

              $fileSucceeded = $true

              foreach ($work in $newWorks) {
                  try {
                      Validate-Work -work $work -sourceFile $file.Name
                  }
                  catch {
                      Write-Host "Skipping invalid work in $($file.Name)"
                      Write-Host $_.Exception.Message
                      $fileSucceeded = $false
                      continue
                  }

                  $existingIndex = -1
                  for ($i = 0; $i -lt $worksList.Count; $i++) {
                      if ($worksList[$i].slug -eq $work.slug) {
                          $existingIndex = $i
                          break
                      }
                  }

                  if ($existingIndex -ge 0) {
                      $worksList[$existingIndex] = $work
                      Write-Host "Replaced existing work: $($work.slug)"
                  }
                  else {
                      [void]$worksList.Add($work)
                      Write-Host "Added new work: $($work.slug)"
                  }
              }

              if ($fileSucceeded) {
                  [void]$processedFiles.Add($file.FullName)
              } else {
                  Write-Host "Leaving file in place because at least one work in it was invalid: $($file.Name)"
              }
          }

          $library.works = $worksList
          $library | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath $outputPath -Encoding UTF8

          $processedFiles | Set-Content -LiteralPath ".processed_uploaded_works.txt" -Encoding UTF8

      - name: Remove processed uploaded work files
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ".processed_uploaded_works.txt")) {
              Write-Host "No processed file list found."
              exit 0
          }

          $files = Get-Content -LiteralPath ".processed_uploaded_works.txt" -Encoding UTF8

          if (-not $files) {
              Write-Host "No uploaded work files to remove."
              Remove-Item -LiteralPath ".processed_uploaded_works.txt" -Force -ErrorAction SilentlyContinue
              exit 0
          }

          foreach ($file in $files) {
              if (Test-Path -LiteralPath $file) {
                  Remove-Item -LiteralPath $file -Force
                  Write-Host "Removed processed file: $file"
              }
          }

          Remove-Item -LiteralPath ".processed_uploaded_works.txt" -Force -ErrorAction SilentlyContinue

      - name: Commit updated library.json
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add library.json uploaded_works .processed_uploaded_works.txt

          $changes = git diff --cached --name-only
          if (-not $changes) {
              Write-Host "No changes to commit."
              exit 0
          }

          git commit -m "Merge uploaded works into library"
          git push
